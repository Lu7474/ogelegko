{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block extra_head %}
<style>
    main.container { max-width: 100%; padding: 0; margin: 0; }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-left">
        <div class="login-brand">
            <div class="login-title">Математика</div>
            <div class="login-subtitle">ОГЭ · ЕГЭ</div>
            <div class="login-year">{% now "Y" %}</div>
        </div>
    </div>

    <div class="login-right">
        <div class="login-form-wrap">
            <h1 class="login-heading">Войти</h1>
            <form method="post">
                {% csrf_token %}
                <div class="login-field">
                    <label for="full_name">ФИО</label>
                    <input type="text" id="full_name" name="full_name"
                           placeholder="Иванов Иван Иванович" required autofocus>
                </div>
                <div class="login-field">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••" required>
                </div>
                {% if error %}
                <div class="error-message" style="margin-bottom:16px;">{{ error }}</div>
                {% endif %}
                <button type="submit" class="login-submit">Войти →</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
