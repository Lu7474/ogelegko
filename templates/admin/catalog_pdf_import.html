{% extends "admin/base_admin.html" %}
{% block title %}Импорт PDF{% endblock %}

{% block content %}
<h1>Импорт PDF</h1>

<form method="post" enctype="multipart/form-data" class="form-card" style="max-width:560px;">
    {% csrf_token %}
    {% if errors %}
    <div class="error-message">
        {% for e in errors %}<div>{{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <div class="form-group">
        <label for="pdf_files">PDF файлы <span style="color:#e74c3c">*</span></label>
        <input type="file" id="pdf_files" name="pdf_files" accept=".pdf" multiple required>
        <small style="color:var(--text-muted);">Можно выбрать несколько файлов</small>
    </div>

    <div class="form-group">
        <label for="exam_type">Тип экзамена <span style="color:#e74c3c">*</span></label>
        <select id="exam_type" name="exam_type" required>
            <option value="">Выберите...</option>
            {% for value, label in exam_types %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>Формат PDF</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;">
                <input type="radio" name="format" value="print_solve" checked style="margin-top:3px;">
                <div>
                    <strong>«Распечатай и реши»</strong>
                    <div style="font-size:0.82rem;color:var(--text-muted);">Ширяева и подобные — структура «Задание N.» + 5 подвопросов</div>
                </div>
            </label>
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;">
                <input type="radio" name="format" value="universal" style="margin-top:3px;">
                <div>
                    <strong>Универсальный</strong>
                    <div style="font-size:0.82rem;color:var(--text-muted);">Каждая страница → одно задание (рендер + текст)</div>
                </div>
            </label>
        </div>
    </div>

    <div class="form-group" id="mode_group">
        <label>Куда сохранить</label>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="mode" value="catalog" checked>
                Только в каталог
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="mode" value="variants">
                Только как варианты
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="radio" name="mode" value="both">
                И в каталог, и как варианты
            </label>
        </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">Запустить импорт</button>
        <a href="{% url 'admin_import_list' %}" class="btn btn-secondary">Отмена</a>
    </div>
</form>

<script>
document.querySelectorAll('input[name="format"]').forEach(function(r) {
    r.addEventListener('change', function() {
        document.getElementById('mode_group').style.display =
            this.value === 'universal' ? 'none' : '';
    });
});
</script>
{% endblock %}
