line-length = 110
target-version = "py311"

[lint]
# E9: синтаксические ошибки, F: pyflakes (неиспользуемые импорты, неопределённые имена)
# W: предупреждения, I: сортировка импортов
select = ["E9", "F", "W", "I"]
ignore = [
    "F401",  # неиспользуемые импорты — часто нужны в __init__.py и views
    "W291",  # trailing whitespace — рuff-format сам исправляет
    "W293",
]

[lint.per-file-ignores]
"exam/migrations/*.py" = ["E501", "F"]  # миграции генерируются автоматически
"exam/tests.py" = ["F811"]              # переопределение переменных в setUp нормально

[format]
quote-style = "double"
indent-style = "space"
